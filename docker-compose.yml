services:
  api:
    container_name: chat_bot
    image: chat_bot
    build: .
    restart: always
    user: ubuntu
    environment:
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL}
      - PAGARME_API_KEY=${PAGARME_API_KEY}
      - PLAN_ID=${PLAN_ID}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - DATABASE_URL=postgresql://chatbot:chatbot@postgres:5432/chatbot?schema=public
      - REDIS_URL=redis://redis:6379
    volumes:
      - ${DEV_ROOT_DIR}:/home/developer/chat
    command: bash -c "cd chat && npm i -g npm@10.8.1 && npm install && npm run build && npx prisma generate && npx puppeteer browsers install chrome && npm run start"
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  ai_worker:
    container_name: chat_bot_ai_worker
    image: chat_bot
    build: .
    restart: always
    user: ubuntu
    environment:
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL}
      - DATABASE_URL=postgresql://chatbot:chatbot@postgres:5432/chatbot?schema=public
      - REDIS_URL=redis://redis:6379
    volumes:
      - ${DEV_ROOT_DIR}:/home/developer/chat
    command: bash -c "cd chat && python3 agent/crewai_worker.py"
    depends_on:
      - redis
      - postgres
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  client:
    container_name: saas_client
    build:
      context: .
      dockerfile: ./client/Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql://chatbot:chatbot@postgres:5432/chatbot?schema=public
      - NEXT_PUBLIC_API_URL=http://api:3000
      - REDIS_URL=redis://redis:6379
    ports:
      - "3001:3001"
    volumes:
      - ${DEV_ROOT_DIR}/client:/app
    command: /bin/sh -c "npm install && npm run build && npm run start"
    depends_on:
      - postgres
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    container_name: chat_bot_postgres
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-chatbot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-chatbot}
      - POSTGRES_DB=${POSTGRES_DB:-chatbot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: chat_bot_redis
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
