services:
  api:
    container_name: chat_bot
    image: chat_bot
    build: .
    restart: always
    user: ubuntu
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - BASIC_MODEL=${BASIC_MODEL}
      - PAGARME_API_KEY=${PAGARME_API_KEY}
      - PLAN_ID=${PLAN_ID}
      - DATABASE_URL=postgresql://chatbot:chatbot@postgres:5432/chatbot?schema=public
    volumes:
      - ${DEV_ROOT_DIR}:/home/developer/chat
    command: bash -c "cd chat && npm i -g npm@10.8.1 && npm install && npm run build && npx prisma generate && npm run start"
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    container_name: chat_bot_postgres
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-chatbot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-chatbot}
      - POSTGRES_DB=${POSTGRES_DB:-chatbot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
